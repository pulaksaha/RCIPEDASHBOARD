<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Departments – RCPIE Portal · CMR Institute of Technology · AY 2023–24</title>
  <meta name="description" content="Department-wise research achievement analysis with radar and bar charts for CMR Institute of Technology."/>
  <link rel="stylesheet" href="style.css"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
</head>
<body>
  <nav id="navbar" role="navigation"></nav>

  <main class="page-wrapper">
    <h1 class="page-title">Department Analysis</h1>
    <p class="page-subtitle">Select a department to view radar chart, target vs achieved breakdown, and pending items.</p>

    <!-- Tablet dropdown -->
    <div class="sidebar-dropdown-wrap">
      <label for="deptDropdown" style="font-size:13px;font-weight:600;color:var(--text-muted);margin-bottom:4px;display:block">Select Department</label>
      <select id="deptDropdown" aria-label="Select department"></select>
    </div>

    <div class="layout-with-sidebar">
      <!-- Sidebar -->
      <aside class="sidebar" aria-label="Department list">
        <div class="sidebar-title">Departments</div>
        <div id="sidebarBtns"></div>
      </aside>

      <!-- Main Content -->
      <div class="main-content" id="deptMainContent">
        <div class="spinner-overlay"><div class="spinner"></div><span class="spinner-label">Loading department data…</span></div>
      </div>
    </div>
  </main>

  <footer id="footer" role="contentinfo"></footer>

  <script src="app.js"></script>
  <script src="departments.js"></script>
</body>
</html>
